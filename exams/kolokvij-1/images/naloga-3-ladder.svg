<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .wire { stroke: #1e293b; stroke-width: 3.5; fill: none; }
      .contact { stroke: #111827; stroke-width: 3; fill: none; }
      .coil { stroke: #111827; stroke-width: 3; fill: #f8fafc; }
      .label { font: 42px 'Segoe UI', Tahoma, sans-serif; fill: #111827; }
      .small { font: 40px 'Segoe UI', Tahoma, sans-serif; fill: #111827; }
    </style>
  </defs>

  <!-- power rails -->
  <line class="wire" x1="36" y1="68" x2="1244" y2="68" />
  <line class="wire" x1="36" y1="684" x2="1244" y2="684" />

  <!-- left branch vertical -->
  <line class="wire" x1="190" y1="68" x2="190" y2="684" />

  <!-- right branch vertical -->
  <line class="wire" x1="760" y1="68" x2="760" y2="684" />

  <!-- Rung 1: A in parallel with K1 -->
  <line class="contact" x1="190" y1="150" x2="210" y2="190" />
  <line class="contact" x1="270" y1="150" x2="290" y2="190" />
  <text class="label" x="230" y="182" text-anchor="middle">A</text>

  <line class="wire" x1="190" y1="268" x2="340" y2="268" />
  <line class="wire" x1="340" y1="68" x2="340" y2="268" />
  <line class="contact" x1="340" y1="150" x2="360" y2="190" />
  <line class="contact" x1="420" y1="150" x2="440" y2="190" />
  <text class="label" x="390" y="182" text-anchor="middle">K1</text>

  <!-- /K2 contact before coil K1 -->
  <line class="contact" x1="190" y1="350" x2="210" y2="390" />
  <line class="contact" x1="190" y1="390" x2="210" y2="350" />
  <text class="small" x="240" y="384" text-anchor="start">K2</text>

  <!-- coil K1 -->
  <line class="wire" x1="190" y1="430" x2="190" y2="500" />
  <rect class="coil" x="110" y="420" width="160" height="74" />
  <text class="label" x="190" y="470" text-anchor="middle">K1</text>

  <!-- Rung 2: K1 in parallel with K2 -->
  <line class="contact" x1="740" y1="150" x2="760" y2="190" />
  <line class="contact" x1="820" y1="150" x2="840" y2="190" />
  <text class="label" x="790" y="182" text-anchor="middle">K1</text>

  <line class="wire" x1="760" y1="258" x2="940" y2="258" />
  <line class="wire" x1="940" y1="68" x2="940" y2="258" />
  <line class="contact" x1="920" y1="150" x2="940" y2="190" />
  <line class="contact" x1="1000" y1="150" x2="1020" y2="190" />
  <text class="label" x="970" y="182" text-anchor="middle">K2</text>

  <!-- B contact before coil K2 -->
  <line class="contact" x1="740" y1="350" x2="760" y2="390" />
  <line class="contact" x1="820" y1="350" x2="840" y2="390" />
  <text class="label" x="790" y="384" text-anchor="middle">B</text>

  <!-- coil K2 -->
  <line class="wire" x1="760" y1="430" x2="760" y2="500" />
  <rect class="coil" x="680" y="420" width="160" height="74" />
  <text class="label" x="760" y="470" text-anchor="middle">K2</text>
</svg>
